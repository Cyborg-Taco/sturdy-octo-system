<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>get trolled</title>

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    #clueBox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 600px;
      z-index: 10;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    video {
      position: absolute;
      width: 300px;
      pointer-events: none;
      z-index: 1;
    }

    #dvdLogo {
      position: absolute;
      width: 120px;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

<div id="clueBox">
  <p>
    Beneath a place where stories sleep in stone and time is sealed away,<br>
    seek what was hidden for tomorrow but buried yesterday.
  </p>
  <button onclick="startExperience()">OK</button>
</div>

<audio id="bgSound" src="sound.mp3" loop></audio>

<img id="dvdLogo" src="DVD.png" style="display:none;">

<script>
  const placedVideos = [];

  function isOverlapping(x, y, w, h) {
    return placedVideos.some(v => {
      return !(
        x + w < v.x ||
        x > v.x + v.w ||
        y + h < v.y ||
        y > v.y + v.h
      );
    });
  }

  function getSafePosition(width, height) {
    let x, y, tries = 0;

    do {
      x = Math.random() * (window.innerWidth - width);
      y = Math.random() * (window.innerHeight - height);
      tries++;
    } while (isOverlapping(x, y, width, height) && tries < 50);

    return { x, y };
  }

  function placeVideo(vid, avoidOverlap = true) {
    const width = 300;
    const height = 200;

    if (avoidOverlap) {
      const pos = getSafePosition(width, height);
      vid.style.left = pos.x + "px";
      vid.style.top = pos.y + "px";

      // update stored position
      vid._pos = { x: pos.x, y: pos.y, w: width, h: height };
    }
  }

 function createVideo(src, options = {}) {
  const vid = document.createElement("video");
  vid.src = src;
  vid.loop = true;
  vid.autoplay = true;

  // Start muted to guarantee autoplay
  vid.muted = true;

  // After it starts, unmute
  vid.addEventListener("canplay", () => {
    vid.muted = false;
    vid.volume = 1.0;
  });

  if (options.center) {
    vid.style.top = "50%";
    vid.style.left = "50%";
    vid.style.transform = "translate(-50%, -50%)";
  } else if (options.bottomRight) {
    vid.style.bottom = "0px";
    vid.style.right = "0px";
  } else {
    placeVideo(vid);
  }

  if (!options.bottomRight) {
    vid.addEventListener("ended", () => {
      placedVideos.length = 0;
      document.querySelectorAll("video").forEach(v => {
        if (v !== vid && v._pos) placedVideos.push(v._pos);
      });
      placeVideo(vid);
    });
  }

  document.body.appendChild(vid);

  if (!options.center && !options.bottomRight) {
    placedVideos.push(vid._pos);
  }

  return vid;
}

    // reposition on loop (except video4)
    if (!options.bottomRight) {
      vid.addEventListener("ended", () => {
        // reset stored positions
        placedVideos.length = 0;
        document.querySelectorAll("video").forEach(v => {
          if (v !== vid && v._pos) placedVideos.push(v._pos);
        });

        placeVideo(vid);
      });
    }

    document.body.appendChild(vid);

    // store initial position
    if (!options.center && !options.bottomRight) {
      placedVideos.push(vid._pos);
    }

    return vid;
  }

  function randomColorFilter() {
    const hue = Math.floor(Math.random() * 360);
    return `hue-rotate(${hue}deg) saturate(2)`;
  }

  function startDVD() {
    const dvd = document.getElementById("dvdLogo");
    dvd.style.display = "block";

    let x = 100, y = 100;
    let dx = 2, dy = 2;

    dvd.style.left = x + "px";
    dvd.style.top = y + "px";
    dvd.style.filter = randomColorFilter();

    function animate() {
      const maxX = window.innerWidth - dvd.offsetWidth;
      const maxY = window.innerHeight - dvd.offsetHeight;

      x += dx;
      y += dy;

      let hitEdge = false;

      if (x <= 0 || x >= maxX) {
        dx *= -1;
        hitEdge = true;
      }

      if (y <= 0 || y >= maxY) {
        dy *= -1;
        hitEdge = true;
      }

      if (hitEdge) {
        dvd.style.filter = randomColorFilter();
      }

      dvd.style.left = x + "px";
      dvd.style.top = y + "px";

      requestAnimationFrame(animate);
    }

    animate();
  }

  function startExperience() {
    document.getElementById("clueBox").style.display = "none";

    document.getElementById("bgSound").play();

    startDVD();

    createVideo("video1.mp4", { center: true });

    setTimeout(() => {
      createVideo("video2.mp4");
    }, 2000);

    setTimeout(() => {
      createVideo("video3.mp4");
    }, 4000);

    setTimeout(() => {
      createVideo("video4.mp4", { bottomRight: true });
    }, 6000);
  }
</script>

</body>
</html>
