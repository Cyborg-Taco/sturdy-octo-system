<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Get Trolled</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: sans-serif;
      cursor: pointer;
    }
    video {
      max-width: 100%;
      max-height: 100%;
      display: none;
    }
  </style>
</head>
<body onclick="startVideo()">

  <div id="message">Click anywhere</div>

  <video id="vid" loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <script>
    function startVideo() {
      const vid = document.getElementById('vid');
      document.getElementById('message').style.display = 'none';
      vid.style.display = 'block';
      vid.play();
    }
  </script>

</body>
</html>
