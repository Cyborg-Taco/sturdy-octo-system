<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>get trolled</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}
#clueBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10000;
}
button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
  z-index: 10001;
}
video {
  position: absolute;
  width: 300px;
  pointer-events: none;
  z-index: 1;
}
#dvdLogo {
  position: absolute;
  width: 120px;
  z-index: 9999;
}
#jumpscare {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: red;
  color: white;
  font-size: 80px;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 20000;
}
.shake { animation: shake 0.1s infinite; }
@keyframes shake {
  0% { transform: translate(2px, 2px); }
  25% { transform: translate(-2px, 2px); }
  50% { transform: translate(2px, -2px); }
  75% { transform: translate(-2px, -2px); }
  100% { transform: translate(2px, 2px); }
}
.glitch { animation: glitch 0.2s infinite; }
@keyframes glitch {
  0% { filter: hue-rotate(0deg); }
  50% { filter: hue-rotate(180deg); }
  100% { filter: hue-rotate(360deg); }
}
</style>
</head>
<body>

<div id="clueBox">
<p>
Beneath a place where stories sleep in stone and time is sealed away,<br>
seek what was hidden for tomorrow but buried yesterday.
</p>
<button onclick="startExperience()">OK</button>
</div>

<div id="jumpscare">YOU'VE BEEN TROLLED</div>

<audio id="bgSound" src="sound.mp3" loop></audio>
<img id="dvdLogo" src="DVD.png" style="display:none;">

<script>
const videos = [];

function randomPos(vid) {
  vid.style.left = Math.random() * (window.innerWidth - 300) + "px";
  vid.style.top = Math.random() * (window.innerHeight - 200) + "px";
}

function spawnVideo(src, options = {}) {
  const v = document.createElement("video");
  v.src = src;
  v.autoplay = true;
  v.loop = true;
  v.muted = true;
  v.style.position = "absolute";

  v.onplaying = () => { v.muted = false; v.volume = 0.3; };

  if (options.center) {
    v.style.top = "50%";
    v.style.left = "50%";
    v.style.transform = "translate(-50%, -50%)";
  } else if (options.bottomRight) {
    v.style.bottom = "0"; v.style.right = "0";
  } else {
    randomPos(v);
  }

  if (!options.bottomRight) {
    let lastTime = 0;
    v.addEventListener('timeupdate', () => {
      // Detect loop: video.currentTime < lastTime
      if (v.currentTime < lastTime) {
        randomPos(v);   // move to new position
        spawnVideo(src); // spawn another
      }
      lastTime = v.currentTime;
    });
  }

  document.body.appendChild(v);
  videos.push(v);
}

function randomColor() {
  return `red`;
}

function startDVD() {
  const dvd = document.getElementById("dvdLogo");
  dvd.style.display = "block";

  let x = 100, y = 100;
  let dx = 2, dy = 2;

  dvd.style.left = x + "px";
  dvd.style.top = y + "px";

  function move() {
    const maxX = window.innerWidth - dvd.offsetWidth;
    const maxY = window.innerHeight - dvd.offsetHeight;

    x += dx;
    y += dy;

    // Bounce on edges
    if (x <= 0 || x >= maxX) dx *= -1;
    if (y <= 0 || y >= maxY) dy *= -1;

    // speed up gradually
    dx *= 1.0005;
    dy *= 1.0005;

    dvd.style.left = x + "px";
    dvd.style.top = y + "px";
    dvd.style.filter = randomColor();

    requestAnimationFrame(move);
  }

  move();
}

function triggerJumpscare() {
  const j = document.getElementById("jumpscare");
  j.style.display = "flex";
  document.body.classList.add("shake","glitch");

  setTimeout(()=>{
    j.style.display = "none";
    document.body.classList.remove("shake","glitch");
  }, 2000);
}

function startExperience() {
  document.getElementById("clueBox").style.display = "none";
  const bgSound = document.getElementById("bgSound");
  bgSound.volume = 0.3;       // set volume to 30%
  bgSound.play().catch(() => {});  // then play the audio
  startDVD();

  spawnVideo("video1.mp4",{center:true});
  setTimeout(()=>spawnVideo("video2.mp4"),2000);
  setTimeout(()=>spawnVideo("video3.mp4"),4000);
  setTimeout(()=>spawnVideo("video4.mp4",{bottomRight:true}),6000);

  // random jumpscare
  setInterval(()=>{if(Math.random()<0.3) triggerJumpscare();},5000);
}
</script>
</body>
</html>
