<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>get trolled</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    #clueBox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 600px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    video {
      position: absolute;
      width: 300px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="clueBox">
  <p>
    Beneath a place where stories sleep in stone and time is sealed away,<br>
    seek what was hidden for tomorrow but buried yesterday.
  </p>
  <button onclick="startExperience()">OK</button>
</div>

<audio id="bgSound" src="sound.mp3" loop></audio>

<script>
  function randomPosition(video) {
    const maxX = window.innerWidth - 300;
    const maxY = window.innerHeight - 200;

    video.style.left = Math.random() * maxX + "px";
    video.style.top = Math.random() * maxY + "px";
  }

  function createVideo(src, centered = false) {
    const vid = document.createElement("video");
    vid.src = src;
    vid.autoplay = true;
    vid.loop = true;
    vid.muted = true;

    if (centered) {
      vid.style.top = "50%";
      vid.style.left = "50%";
      vid.style.transform = "translate(-50%, -50%)";
    } else {
      randomPosition(vid);
    }

    document.body.appendChild(vid);
    return vid;
  }

  function startExperience() {
    document.getElementById("clueBox").style.display = "none";

    // Play sound
    const audio = document.getElementById("bgSound");
    audio.play();

    // Video 1 (center)
    const v1 = createVideo("video1.mp4", true);

    // After it starts playing once, add more
    setTimeout(() => {
      createVideo("video2.mp4");
    }, 2000);

    setTimeout(() => {
      createVideo("video3.mp4");
    }, 4000);

    setTimeout(() => {
      createVideo("video4.mp4");
    }, 6000);
  }
</script>

</body>
</html>
