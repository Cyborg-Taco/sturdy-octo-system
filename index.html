<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>get trolled</title>

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    #clueBox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 600px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    video {
      position: absolute;
      width: 300px;
      pointer-events: none;
    }

    #dvdLogo {
      position: absolute;
      width: 120px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="clueBox">
  <p>
    Beneath a place where stories sleep in stone and time is sealed away,<br>
    seek what was hidden for tomorrow but buried yesterday.
  </p>
  <button onclick="startExperience()">OK</button>
</div>

<audio id="bgSound" src="sound.mp3" loop></audio>

<img id="dvdLogo" src="dvd.png" style="display:none;">

<script>
  function randomPosition(video) {
    const maxX = window.innerWidth - 300;
    const maxY = window.innerHeight - 200;

    video.style.left = Math.random() * maxX + "px";
    video.style.top = Math.random() * maxY + "px";
  }

  function createVideo(src, centered = false, bottomRight = false) {
    const vid = document.createElement("video");
    vid.src = src;
    vid.autoplay = true;
    vid.loop = true;
    vid.muted = true;

    if (centered) {
      vid.style.top = "50%";
      vid.style.left = "50%";
      vid.style.transform = "translate(-50%, -50%)";
    } else if (bottomRight) {
      vid.style.bottom = "0px";
      vid.style.right = "0px";
    } else {
      randomPosition(vid);
    }

    document.body.appendChild(vid);
    return vid;
  }

  function randomColorFilter() {
    const hue = Math.floor(Math.random() * 360);
    return `hue-rotate(${hue}deg) saturate(2)`;
  }

  function startDVD() {
    const dvd = document.getElementById("dvdLogo");
    dvd.style.display = "block";

    let x = 100, y = 100;
    let dx = 2, dy = 2;

    dvd.style.filter = randomColorFilter();

    function animate() {
      const maxX = window.innerWidth - dvd.offsetWidth;
      const maxY = window.innerHeight - dvd.offsetHeight;

      x += dx;
      y += dy;

      let hitEdge = false;

      if (x <= 0 || x >= maxX) {
        dx *= -1;
        hitEdge = true;
      }

      if (y <= 0 || y >= maxY) {
        dy *= -1;
        hitEdge = true;
      }

      if (hitEdge) {
        dvd.style.filter = randomColorFilter();
      }

      dvd.style.left = x + "px";
      dvd.style.top = y + "px";

      requestAnimationFrame(animate);
    }

    animate();
  }

  function startExperience() {
    document.getElementById("clueBox").style.display = "none";

    const audio = document.getElementById("bgSound");
    audio.play();

    startDVD();

    createVideo("video1.mp4", true);

    setTimeout(() => {
      createVideo("video2.mp4");
    }, 2000);

    setTimeout(() => {
      createVideo("video3.mp4");
    }, 4000);

    setTimeout(() => {
      createVideo("video4.mp4", false, true);
    }, 6000);
  }
</script>

</body>
</html>
