<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>something interesting</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

#clueBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
}

video {
  position: absolute;
  width: 400px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
</style>
</head>
<body>

<div id="clueBox">
<p>
Beneath a place where stories sleep in stone and time is sealed away,<br>
seek what was hidden for tomorrow but buried yesterday.
</p>
<button onclick="startExperience()">OK</button>
</div>

<audio id="bgSound" src="sound.mp3" loop></audio>

<script>
function startExperience() {
  document.getElementById("clueBox").style.display = "none";

  const bgSound = document.getElementById("bgSound");
  bgSound.volume = 0.3;
  bgSound.play().catch(() => {});

  const v = document.createElement("video");
  v.src = "video1.mp4";
  v.autoplay = true;
  v.loop = true;
  v.controls = false;
  v.style.position = "absolute";
  v.style.top = "50%";
  v.style.left = "50%";
  v.style.transform = "translate(-50%, -50%)";

  document.body.appendChild(v);
}
</script>

</body>
</html>
